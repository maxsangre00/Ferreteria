<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="sql-wasm.js"></script>
<script src="html5-qrcode.min.js"></script>

<!--  IMPORTANTE -->
<script src="script.js" defer></script>

<script>
    let chartDonut;
    let porcentajeAnimado = 0;
    

const pluginTextoCentro = {
    id: "textoCentro",
    beforeDraw(chart){

        const {ctx, chartArea:{width, height}} = chart;

        ctx.save();

        //  color dinámico
        const colorTexto = chart.data.datasets[0].backgroundColor[1];

        ctx.font = "bold 22px Arial";
        ctx.fillStyle = colorTexto;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        //  usar el valor animado (NO el final)
        ctx.fillText(Math.round(porcentajeAnimado) + "%", width / 2, height / 2);

        ctx.restore();
    }
};
const pluginGlow = {
    id: "glow",
    beforeDatasetDraw(chart, args, options){
        const {ctx} = chart;

        ctx.save();

        ctx.shadowColor = options.color || "rgba(34,197,94,0.8)";
        ctx.shadowBlur = options.blur || 20;

    },
    afterDatasetDraw(chart){
        chart.ctx.restore();
    }
};
function mostrarSeccion(id){
    document.querySelectorAll('.seccion').forEach(s => s.style.display='none');
    const el = document.getElementById(id);
    if(el) el.style.display='block';
}
window.onload = () => {
    const user = JSON.parse(localStorage.getItem("usuario"));

    if(user.rol !== "admin"){
        document.querySelectorAll(".solo-admin").forEach(el => {
            el.style.display = "none";
        });
    }
};

function animarPorcentaje(chart, valorFinal){

    porcentajeAnimado = 0;

    const duracion = 800;
    const pasos = duracion / 16;
    const incremento = valorFinal / pasos;

    function frame(){
        porcentajeAnimado += incremento;

        if(porcentajeAnimado >= valorFinal){
            porcentajeAnimado = valorFinal;
        }

        chart.update(); // redibuja el gráfico

        if(porcentajeAnimado < valorFinal){
            requestAnimationFrame(frame);
        }
    }

    frame();
}

function animarNumero(el, valorFinal){

    let actual = 0;
    const duracion = 800;
    const pasos = duracion / 16;
    const incremento = valorFinal / pasos;

    function frame(){
        actual += incremento;

        if(actual >= valorFinal){
            el.innerText = "$" + valorFinal.toLocaleString();
            return;
        }

        el.innerText = "$" + Math.floor(actual).toLocaleString();
        requestAnimationFrame(frame);
    }

    frame();
}

function aplicarColorEstado(ganancia, gananciaAyer){

    const widget = document.querySelector(".widget-hoy");

    if(!widget || gananciaAyer === null) return;

    // limpiar clases anteriores
    widget.classList.remove("pulse-verde", "pulse-rojo");

    if(ganancia > gananciaAyer){
        widget.classList.add("pulse-verde");
    }else if(ganancia < gananciaAyer){
        widget.classList.add("pulse-rojo");
    }
}

function aplicarColorNumero(ganancia, gananciaAyer){

    const el = document.getElementById("gananciaHoy");

    if(!el || gananciaAyer === null) return;

    // limpiar clases
    el.classList.remove("sube", "baja", "igual");

    if(ganancia > gananciaAyer){
        el.classList.add("sube");
    }else if(ganancia < gananciaAyer){
        el.classList.add("baja");
    }else{
        el.classList.add("igual");
    }
}

function crearDonut(ventas, ganancia, gananciaAyer){

    const canvas = document.getElementById("graficoDonut");

    if(chartDonut){
        chartDonut.destroy();
    }

    // 🎨 color según estado
    let colorObjetivo = [34,197,94]; // verde

    if(gananciaAyer !== null && ganancia < gananciaAyer){
        colorObjetivo = [239,68,68]; // rojo
    }

    let colorActual = [120,120,120];

    chartDonut = new Chart(canvas, {
        type: "doughnut",
        data: {
            labels: ["Ventas", "Ganancia"],
            datasets: [{
                data: [ventas, ganancia],
                backgroundColor: [
                    "rgba(37,99,235,0.6)",
                    `rgba(${colorActual.join(",")},0.7)`
                ],
                borderWidth: 0,
                hoverOffset: 25
            }]
        },
        options: {
            cutout: "70%",
            animation: {
                duration: 800
            },
            plugins: {
              legend: {
        position: "bottom",
        align: "center",
        labels: {
            color: "#fff",
            boxWidth: 8,
            padding: 10,
            usePointStyle: true,
            font: {
                size: 10 //  circulitos en vez de cuadrados
        }
          }
    },
                //  ACTIVAR GLOW (esto faltaba)
                glow: {
                    color: `rgba(${colorObjetivo.join(",")},0.9)`,
                    blur: 25
                }
            }
        },
        plugins: [pluginTextoCentro, pluginGlow]
    });

    // 🎬 animación color
    let paso = 0;

    function animarColor(){
        paso += 0.05;

        if(paso >= 1) return;

        const nuevoColor = colorActual.map((c, i) =>
            Math.floor(c + (colorObjetivo[i] - c) * paso)
        );

        chartDonut.data.datasets[0].backgroundColor[1] =
            `rgba(${nuevoColor.join(",")},0.7)`;

        chartDonut.update();

        requestAnimationFrame(animarColor);
    }

    animarColor();

    // 🔥 animación glow (pulse)
    let intensidad = 25;

    setInterval(() => {
        if(!chartDonut) return;

        intensidad = intensidad === 25 ? 40 : 25;

        chartDonut.options.plugins.glow.blur = intensidad;
        chartDonut.update();
    }, 600);

    // porcentaje
    const total = ventas + ganancia;
    const porcentajeFinal = total > 0 
        ? (ganancia / total) * 100 
        : 0;

    animarPorcentaje(chartDonut, porcentajeFinal);
}

async function cargarWidgetHoy(){

    try{
        const hoy = new Date();
        const ayer = new Date();
        ayer.setDate(hoy.getDate() - 1);

        const f1 = ayer.toISOString().split("T")[0];
        const f2 = hoy.toISOString().split("T")[0];

        const res = await fetch(`http://localhost:3000/estadisticas-rango?desde=${f1}&hasta=${f2}`);
        const data = await res.json();

        if(data.length === 0) return;

        const hoyData = data[data.length - 1];
        const ayerData = data.length > 1 ? data[data.length - 2] : null;

        const ventas = Number(hoyData.ventas || 0);
        const ganancia = Number(hoyData.ganancia || 0);
        const gananciaAyer = ayerData ? Number(ayerData.ganancia || 0) : null;

        //  animación números
        animarNumero(document.getElementById("ventasHoy"), ventas);
        animarNumero(document.getElementById("gananciaHoy"), ganancia);

        //  gráfico PRO
        crearDonut(ventas, ganancia, gananciaAyer);
          aplicarColorEstado(ganancia, gananciaAyer);
          aplicarColorNumero(ganancia, gananciaAyer);

    }catch(err){
        console.error("Error widget:", err);
    }
   
}
document.addEventListener("DOMContentLoaded", cargarWidgetHoy);

</script>
<div class="overlay"></div>
</body>
